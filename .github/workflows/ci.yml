name: CI

on:
  push:
    branches: [master, develop, "feat/**", "fix/**", "chore/**", "docs/**", "spec/**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: [develop, master]

jobs:
  build:
    name: build (${{ matrix.configuration }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Format check
        if: matrix.configuration == 'Release'
        run: dotnet format --verify-no-changes

      - name: Build
        run: dotnet build -c ${{ matrix.configuration }} --no-restore

      - name: Test + coverage
        if: matrix.configuration == 'Release'
        run: |
          dotnet test -c Release --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory artifacts/TestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Coverage gate
        if: matrix.configuration == 'Release'
        run: ./build/coverage-gate.sh

      - name: Clean architecture check
        if: matrix.configuration == 'Release'
        run: ./build/clean-architecture-check.sh

      - name: OpenSpec lint
        if: matrix.configuration == 'Release'
        run: ./build/openspec-lint.sh

      - name: Detect credentials
        if: matrix.configuration == 'Release'
        run: ./build/detect-here-credentials.sh

      - name: Vulnerability check
        if: matrix.configuration == 'Release'
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee /tmp/vuln.txt
          if grep -q "has the following vulnerable packages" /tmp/vuln.txt; then
            echo "::error::Vulnerable NuGet packages detected — fix before merging"
            exit 1
          fi

      - name: Outdated packages check
        if: matrix.configuration == 'Release'
        run: dotnet list package --outdated || true

      - name: TFM check
        if: matrix.configuration == 'Release'
        run: |
          missing=$(find src -name "*.csproj" -exec grep -rL "net10\.0" {} +)
          if [ -n "$missing" ]; then
            echo "::error::One or more library projects do not target net10.0"
            echo "$missing"
            exit 1
          fi

      - name: Pack
        if: matrix.configuration == 'Release'
        run: dotnet pack src/Here.Sdk.Common -c Release --no-build -o artifacts/packages --include-symbols

      - name: Binary size check
        if: matrix.configuration == 'Release'
        run: ./build/measure-binary-size.sh

      - name: Upload coverage
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: artifacts/TestResults/**/coverage.cobertura.xml

      - name: Upload packages
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/packages/

  publish:
    name: publish to NuGet
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: nuget-production

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/packages

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Push to NuGet
        env:
          NUGET_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "artifacts/packages/*.nupkg" \
            --api-key "$NUGET_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push "artifacts/packages/*.snupkg" \
            --api-key "$NUGET_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
